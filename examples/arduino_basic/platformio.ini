[platformio]
default_envs = nanoatmega328

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 9600

; Указываем где искать библиотеку
lib_extra_dirs = ../../

; Добавляем пути к заголовочным файлам
build_flags = 
    -I../../include
    -I../../src
    -I../../src/hal

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
lib_extra_dirs = ../../
build_flags = 
    -I../../include
    -I../../src
    -I../../src/hal

[env:mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
monitor_speed = 9600
lib_extra_dirs = ../../
build_flags = 
    -I../../include
    -I../../src
    -I../../src/hal