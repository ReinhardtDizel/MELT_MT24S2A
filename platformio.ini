; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nanoatmega328
; Окружение по умолчанию - Arduino Nano

; ============================================
; ОБЩИЕ НАСТРОЙКИ
; ============================================
[env]
; Общие флаги компиляции для всех платформ
build_flags = 
    -Wall
    -Wextra
    -D DEBUG_LCD=1

; ============================================
; ARDUINO ПЛАТФОРМЫ
; ============================================
[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_ARDUINO
monitor_speed = 9600
upload_speed = 57600

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_ARDUINO
monitor_speed = 9600

[env:mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_ARDUINO
monitor_speed = 9600

; ============================================
; AVR (чистый, без Arduino framework)
; ============================================
[env:avr_atmega328p]
platform = atmelavr
board = ATmega328P
build_flags = 
    ${env.build_flags}
    -D PLATFORM_AVR
    -D F_CPU=16000000UL

; ============================================
; STM32 ПЛАТФОРМЫ
; ============================================
[env:stm32_nucleo]
platform = ststm32
board = nucleo_f103rb
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_STM32
monitor_speed = 115200

[env:stm32_bluepill]
platform = ststm32
board = bluepill_f103c8
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_STM32
upload_protocol = stlink
monitor_speed = 115200

; ============================================
; ESP ПЛАТФОРМЫ
; ============================================
[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_ESP8266
monitor_speed = 115200

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = 
    ${env.build_flags}
    -D PLATFORM_ESP32
monitor_speed = 115200